<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Anime Captcha</title>
    <!-- 1. HTML Meta 태그를 이용한 즉시 이동 -->
    <meta http-equiv="refresh" content="0; url=/captcha">
    <script>
        // 2. 자바스크립트를 이용한 보조 리디렉션 (Meta 태그 미작동 대비)
        window.location.replace("/captcha");
    </script>
</head>
<body>
    <p>페이지가 이동되었습니다.</p>
    <p><a href="/captcha">이동</a></p>
</body>
</html>
